services:
  db:
    image: postgres:16
    container_name: llm_judge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: llm_pass
      POSTGRES_DB: llm_judge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_user -d llm_judge"]
      interval: 5s
      timeout: 5s
      retries: 10

  loader:
    image: python:3.12-slim
    container_name: llm_judge_loader
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "pip install psycopg2-binary -q && python load_data.py"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: llm_judge
      DB_USER: llm_user
      DB_PASSWORD: llm_pass
    restart: "no"

  judge:
    image: python:3.12-slim
    container_name: llm_judge_runner
    depends_on:
      db:
        condition: service_healthy
      loader:
        condition: service_completed_successfully
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "pip install psycopg2-binary openai python-dotenv && python src/judge_example.py"
    env_file: .env
    environment:
      DB_HOST: db
      PYTHONUNBUFFERED: "1"
    restart: "no"

volumes:
  pgdata:
